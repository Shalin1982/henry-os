name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate installer scripts
        run: |
          shellcheck install.sh || true
          # Basic syntax check
          bash -n install.sh
          pwsh -Command "Get-Command install.ps1" || true

      - name: Create release archive
        run: |
          mkdir -p dist
          tar -czf dist/henry-os-${{ github.ref_name }}.tar.gz \
            --exclude='.git' \
            --exclude='dist' \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: henry-os-release
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: henry-os-release
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
